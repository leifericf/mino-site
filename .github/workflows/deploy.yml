name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
  repository_dispatch:
    types: [mino-release]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: DeLaGuardo/setup-clojure@13
        with:
          cli: latest

      - uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
          key: m2-${{ hashFiles('deps.edn') }}

      - name: Bootstrap mino binary
        working-directory: mino
        run: |
          cc -std=c99 -O2 \
            -Isrc -Isrc/public -Isrc/runtime -Isrc/gc -Isrc/eval \
            -Isrc/collections -Isrc/prim -Isrc/async -Isrc/interop \
            -Isrc/diag -Isrc/vendor/imath \
            -o mino \
            src/public/*.c src/runtime/*.c src/gc/*.c src/eval/*.c \
            src/collections/*.c src/prim/*.c src/async/*.c src/interop/*.c \
            src/regex/*.c src/diag/*.c src/vendor/imath/*.c \
            main.c -lm

      - name: Build site
        run: clojure -X:build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
